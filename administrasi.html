<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Administrasi Sekolah</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Navbar */
    nav {
      background: #2f855a;
      color: white;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .logo { display: flex; align-items: center; gap: 10px; }
    nav .logo img { width: 40px; height: 40px; }
    nav ul { list-style: none; display: flex; gap: 20px; margin-right: 20px; }
    nav a { color: white; text-decoration: none; font-weight: bold; }

    /* Container */
    .container { padding: 20px; }

    /* Card grid dokumen */
    .row { display: flex; flex-wrap: wrap; gap: 20px; }
    .card {
      flex: 1 1 250px;
      background: #f1f8e9;
      border: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
      padding: 20px;
      border-radius: 8px;
    }
    .card i { font-size: 40px; color: #2f855a; margin-bottom: 10px; }
    .card h5 { color: #2f855a; margin-bottom: 10px; }
    .card a {
      display: inline-block;
      background: #2f855a;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
    }
    .card a:hover { background: #276749; }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>

  <!-- Navbar -->

    </ul>
  </nav>

    <div class="row">
      <!-- Contoh dokumen -->

        <i class="fas fa-file-alt"></i>
        <h5>Surat Izin</h5>
        <a href="dokumen/surat_izin.docx" download><i class="fas fa-download"></i> Unduh</a>
