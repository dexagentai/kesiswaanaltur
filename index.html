<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Kesiswaan</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome untuk ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .dashboard {
      text-align: center;
      margin-top: 100px;
    }
    .dashboard h2 {
      color: #006400;
      margin-bottom: 5px;
    }
    .dashboard p {
      color: #555;
      margin-top: 0;
      font-size: 14px;
    }
    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #f0fff4;
      border-radius: 8px;
      padding: 20px;
      width: 180px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card h3 {
      margin: 0;
      color: #006400;
      font-size: 16px;
      font-weight: 600;
    }
    .card .value {
      font-size: 22px;
      font-weight: bold;
      color: #006400;
      margin: 8px 0;
    }
    .card i {
      font-size: 22px;
      color: #006400;
    }
  </style>
</head>
<body>
  <!-- Navbar seragam -->
  <nav>
    <div class="logo">
      <img src="logo-smk.png" alt="Logo SMK AL HUDA TURALAK">
      <span>SMK AL HUDA TURALAK</span>
    </div>
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="siswa.html"><i class="fas fa-users"></i> Data Siswa</a></li>
      <li><a href="absensi.html"><i class="fas fa-calendar-check"></i> Absensi</a></li>
      <li><a href="administrasi.html"><i class="fas fa-folder-open"></i> Administrasi</a></li>
    </ul>
  </nav>

  <div class="dashboard">
    <h2>Dashboard Kesiswaan</h2>
    <p>Sistem Data & Absensi SMK AL HUDA TURALAK</p>
    <hr style="width:80%; border:0; border-top:1px solid #ccc; margin:20px auto;">
    <div class="cards">
      <div class="card">
        <h3>Total Siswa</h3>
        <div class="value" id="total-siswa">0</div>
        <i class="fas fa-users"></i>
      </div>
      <div class="card">
        <h3>Siswa TRK</h3>
        <div class="value" id="siswa-trk">0</div>
        <i class="fas fa-user"></i>
      </div>
      <div class="card">
        <h3>Jurusan</h3>
        <div class="value" id="jurusan">6</div>
        <i class="fas fa-table"></i>
      </div>
      <div class="card">
        <h3>Total Kelas</h3>
        <div class="value" id="total-kelas">19</div>
        <i class="fas fa-book"></i>
      </div>
    </div>
  </div>

  <footer>© 2026 SMK AL HUDA TURALAK — Sistem Kesiswaan</footer>

  <!-- Script koneksi Supabase -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabaseUrl = 'https://pgyohppycxecdnfmoqgk.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...' // anon key kamu
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function loadDashboard() {
      const { data, error } = await supabase
        .from('siswa')
        .select('*')

      if (error) {
        console.error('Error ambil data:', error)
        return
      }

      // Hitung total siswa
      const totalSiswa = data.length

      // Hitung siswa TRK
      const siswaTRK = data.filter(s => s.pangkalan === 'TRK').length

      // Jurusan dan kelas statis (bisa diganti kalau mau dinamis)
      const jurusan = 6
      const totalKelas = 19

      // Tampilkan ke dashboard
      document.getElementById('total-siswa').textContent = totalSiswa
      document.getElementById('siswa-trk').textContent = siswaTRK
      document.getElementById('jurusan').textContent = jurusan
      document.getElementById('total-kelas').textContent = totalKelas
    }

    loadDashboard()
  </script>
</body>
</html>
