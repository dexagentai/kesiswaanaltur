<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi Siswa</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .kop-surat {
      text-align: center;
      border-bottom: 2px solid #000;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .kop-surat img {
      float: left;
      width: 70px;
      height: 70px;
      margin-right: 15px;
    }
    .kop-surat h2, .kop-surat h3, .kop-surat p {
      margin: 0;
      line-height: 1.4;
    }

    .tabel-absensi {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 13px;
    }
    .tabel-absensi th, .tabel-absensi td {
      border: 1px solid #000;
      padding: 6px;
    }
    .tabel-absensi th {
      background-color: #e6ffe6;
      color: #006400;
    }
    /* Nama rata kiri dan sejajar */
    .tabel-absensi th:nth-child(2),
    .tabel-absensi td:nth-child(2) {
      text-align: left;
      padding-left: 8px;
      vertical-align: middle;
    }
    .tabel-absensi td {
      line-height: 1.4;
    }

    .toolbar {
      margin-bottom: 20px;
      text-align: center;
    }
    .btn-green {
      background: #2f855a;
      color: white;
      border: none;
      padding: 6px 12px;
      margin-left: 10px;
      cursor: pointer;
      border-radius: 4px;
    }
    .btn-green:hover { background: #276749; }

    .ttd-section {
      margin-top: 40px;
      width: 90%;
      font-size: 14px;
    }
    .ttd-section table {
      width: 100%;
      border-collapse: collapse;
    }
    .ttd-section td {
      width: 50%;
      text-align: center;
      vertical-align: bottom;
      height: 100px;
    }
    .ttd-section .nama {
      border-top: 1px solid #000;
      display: inline-block;
      padding-top: 4px;
    }

    @media print {
      .toolbar { display: none; }
    }
  </style>
</head>
<body>
  <!-- Kop surat -->
  <div class="kop-surat">
    <img src="logo-smk.png" alt="Logo SMK AL HUDA TURALAK">
    <h2>YAYASAN AL HUDA TURALAK</h2>
    <h3>SMK AL HUDA TURALAK</h3>
    <p>Jl. Raya Turalak No. 123, Kab. Ciamis, Jawa Barat</p>
    <p>Telp: (0265) 123456 — Email: smkalhuda@sch.id</p>
  </div>

  <div class="container">
    <h2>Absensi Siswa</h2>

    <div class="toolbar">
      <label for="filter-kelas">Pilih Kelas/Jurusan:</label>
      <select id="filter-kelas"></select>
      <button class="btn-green" onclick="window.print()">Cetak Absensi</button>
    </div>

    <div id="absensi-container"></div>

    <!-- Bagian tanda tangan -->
    <div class="ttd-section">
      <table>
        <tr>
          <td>
            Mengetahui,<br>Waka Kurikulum<br><br><br>
            <span class="nama">Suryanto, S.E</span>
          </td>
          <td>
            Guru Mapel<br><br><br>
            <span class="nama">.......................................</span>
          </td>
        </tr>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabaseUrl = 'https://pgyohppycxecdnfmoqgk.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBneW9ocHB5Y3hlY2RuZm1vcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNDM2NDEsImV4cCI6MjA5NjcxOTY0MX0.prvXAPB3ljwwsgaFq0dLng4Ejt2J9ViSX9gk7a38zdY'
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function loadAbsensi() {
      const { data, error } = await supabase
        .from('siswa')
        .select('Nama, NISN, Kelas_jurusan, pangkalan')
        .order('Nama', { ascending: true })

      if (error) {
        document.getElementById('absensi-container').innerHTML =
          `<p style="color:red;">Error: ${error.message}</p>`
        return
      }

      const siswaTRK = data.filter(s => s.pangkalan?.toUpperCase() === 'TRK')
      const kelasSet = [...new Set(siswaTRK.map(s => s.Kelas_jurusan).filter(Boolean))]
      const filterSelect = document.getElementById('filter-kelas')
      filterSelect.innerHTML = ''

      // isi dropdown kelas
      kelasSet.forEach(k => {
        const opt = document.createElement('option')
        opt.value = k
        opt.textContent = k
        filterSelect.appendChild(opt)
      })

      function renderAbsensi(kelas) {
        const siswaKelas = siswaTRK.filter(s => s.Kelas_jurusan === kelas)
        const container = document.getElementById('absensi-container')

        if (siswaKelas.length === 0) {
          container.innerHTML = `<p style="color:red;">Tidak ada data untuk kelas ${kelas}</p>`
          return
        }

        container.innerHTML = `
          <h3>${kelas}</h3>
          <table class="tabel-absensi">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama Peserta Didik</th>
                <th>NISN</th>
              </tr>
            </thead>
            <tbody>
              ${siswaKelas.map((s,i)=>`
                <tr>
                  <td>${i+1}</td>
                  <td>${s.Nama}</td>
                  <td>${s.NISN}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        `
      }

      if (kelasSet.length > 0) {
        renderAbsensi(kelasSet[0])
        filterSelect.onchange = () => renderAbsensi(filterSelect.value)
      }
    }

    loadAbsensi()
  </script>
</body>
</html>
