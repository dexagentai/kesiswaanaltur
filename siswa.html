<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Data Siswa</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== NAVBAR ===== */
    nav {
      background-color: #006400;
      padding: 10px 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    nav ul li a:hover {
      color: #ffeb3b;
      transform: scale(1.1);
    }

    /* ===== TOOLBAR ===== */
    .toolbar { margin-bottom: 15px; }
    .toolbar select, .toolbar button {
      margin-right: 10px;
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }
    .btn-blue { background: #007bff; color: white; }
    .btn-green { background: #28a745; color: white; }
    .btn-yellow { background: #ffc107; border: none; padding: 4px 8px; cursor: pointer; }

    /* ===== TABEL ===== */
    .kelas-header {
      background-color: #0099ff;
      color: white;
      padding: 6px;
      margin-top: 20px;
    }
    .tabel-siswa {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    .tabel-siswa th, .tabel-siswa td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      color: #555;
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="siswa.html">Data Siswa</a></li>
      <li><a href="absensi.html">Template Absensi</a></li>
      <li><a href="administrasi.html">Administrasi</a></li>
    </ul>
  </nav>

  <div class="container">
    <h2>Data Siswa</h2>

    <div class="toolbar">
      <label for="filter-pangkalan">Filter pangkalan:</label>
      <select id="filter-pangkalan">
        <option value="ALL">Semua pangkalan</option>
        <option value="Turalak">Turalak (TRK)</option>
        <option value="KelasJauh">Kelas Jauh (≠ TRK)</option>
      </select>
      <button class="btn-blue">Tambah Siswa</button>
      <button class="btn-green" id="btn-unduh">Unduh Excel</button>
    </div>

    <div id="data-container"></div>
  </div>

  <footer>© 2026 SMK AL HUDA TURALAK — Sistem Kesiswaan</footer>

  <!-- Script koneksi Supabase -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabaseUrl = 'https://pgyohppycxecdnfmoqgk.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBneW9ocHB5Y3hlY2RuZm1vcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNDM2NDEsImV4cCI6MjA5NjcxOTY0MX0.prvXAPB3ljwwsgaFq0dLng4Ejt2J9ViSX9gk7a38zdY' // anon key kamu
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function loadData() {
      const { data, error } = await supabase
        .from('siswa')
        .select('*')
        .order('Kelas_jurusan', { ascending: true })
        .order('Nama', { ascending: true })

      if (error) {
        console.error('Error ambil data:', error)
        document.getElementById('data-container').innerHTML =
          `<p style="color:red;">Gagal ambil data dari Supabase: ${error.message}</p>`
        return
      }

      const container = document.getElementById('data-container')
      const filterSelect = document.getElementById('filter-pangkalan')

      // Kelompokkan data berdasarkan kelas/jurusan
      const grouped = {}
      data.forEach(s => {
        const kelas = s.Kelas_jurusan
        if (!grouped[kelas]) grouped[kelas] = []
        grouped[kelas].push(s)
      })

      // Render tabel per kelas dengan filter pangkalan
      function renderTables(filter) {
        container.innerHTML = ''
        Object.keys(grouped).forEach(kelas => {
          let filteredData = grouped[kelas]

          if (filter === 'Turalak') {
            filteredData = grouped[kelas].filter(s => s.pangkalan === 'TRK')
          } else if (filter === 'KelasJauh') {
            filteredData = grouped[kelas].filter(s => s.pangkalan !== 'TRK')
          }

          if (filteredData.length === 0) return

          const section = `
            <div class="kelas-section" data-kelas="${kelas}">
              <h3 class="kelas-header">${kelas} — ${filteredData.length} siswa</h3>
              <table class="tabel-siswa">
                <thead>
                  <tr>
                    <th>No</th><th>Nama</th><th>NISN</th><th>JK</th>
                    <th>Alamat</th><th>Tempat Lahir</th><th>Tanggal Lahir</th>
                    <th>Pangkalan</th><th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  ${filteredData.map((s, i) => `
                    <tr>
                      <td>${i + 1}</td>
                      <td>${s.Nama}</td>
                      <td>${s.NISN}</td>
                      <td>${s.JK}</td>
                      <td>${s.Alamat}</td>
                      <td>${s['Tempat Lahir'] || ''}</td>
                      <td>${s['Tanggal Lahir'] || ''}</td>
                      <td>${s.pangkalan || ''}</td>
                      <td>
                        <button class="btn-yellow" onclick="bukaForm('${s.NISN}','${s.Nama}','${s.pangkalan}')">
                          Koreksi Data
                        </button>
                      </td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>`
          container.insertAdjacentHTML('beforeend', section)
        })
      }

      // Render awal
      renderTables('ALL')
      filterSelect.onchange = () => renderTables(filterSelect.value)
    }

    // Panggil pertama kali
    loadData()

    // Fungsi buka Google Form
    window.bukaForm = function(nisn, nama, pangkalan) {
      const url = `https://forms.gle/68vusL6WLDvj7eMx9?usp=pp_url&entry.111111=${encodeURIComponent(nisn)}&entry.222222=${encodeURIComponent(nama)}&entry.333333=${encodeURIComponent(pangkalan)}`
      window.open(url, '_blank')
    }

    // Fungsi Unduh Excel (CSV)
    document.getElementById('btn-unduh').addEventListener('click', async () => {
      try {
        const { data, error } = await supabase
          .from('siswa')
          .select('*')
          .order('Kelas_jurusan', { ascending: true })
          .order('Nama', { ascending: true })

        if (error) throw error

        const header = Object.keys(data[0]).join(',')
        const rows = data.map(row => Object.values(row).join(',')).join('\n')
        const csvContent = `${header}\n${rows}`

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'data_siswa.csv'
        a.click()
        URL.revokeObjectURL(url)
      } catch (err) {
        alert('Gagal mengunduh data: ' + err.message)
      }
    })
  </script>
</body>
</html>
