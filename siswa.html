<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Data Siswa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="siswa.html">Data Siswa</a></li>
      <li><a href="absensi.html">Template Absensi</a></li>
      <li><a href="administrasi.html">Administrasi</a></li>
    </ul>
  </nav>

  <div class="container">
    <h2>Data Siswa</h2>
    <table id="tabel-siswa">
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>NISN</th>
          <th>Jenis Kelamin</th>
          <th>Kelas</th>
          <th>Alamat</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data dari Supabase akan muncul di sini -->
      </tbody>
    </table>
  </div>

  <footer>© 2026 SMK AL HUDA TURALAK — Sistem Kesiswaan</footer>

  <!-- Script koneksi Supabase -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabaseUrl = 'https://pgyohppycxecdnfmoqgk.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBneW9ocHB5Y3hlY2RuZm1vcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNDM2NDEsImV4cCI6MjA5NjcxOTY0MX0.prvXAPB3ljwwsgaFq0dLng4Ejt2J9ViSX9gk7a38zdY'
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function loadData() {
      const { data, error } = await supabase
        .from('siswa')
        .select('*')
        .order('nama', { ascending: true })

      if (error) {
        console.error(error)
        return
      }

      const tbody = document.querySelector('#tabel-siswa tbody')
      tbody.innerHTML = ''
      data.forEach((s, i) => {
        const row = `
          <tr>
            <td>${i + 1}</td>
            <td>${s.nama}</td>
            <td>${s.nisn}</td>
            <td>${s.jk}</td>
            <td>${s.kelas}</td>
            <td>${s.alamat}</td>
          </tr>`
        tbody.insertAdjacentHTML('beforeend', row)
      })
    }

    loadData()
  </script>
</body>
</html>
