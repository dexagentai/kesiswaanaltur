<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Koreksi Data Siswa</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    form { max-width: 500px; margin: auto; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 15px; padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h2>Koreksi Data Siswa</h2>
  <form id="form-koreksi">
    <label>Nama Siswa:</label>
    <input type="text" id="Nama" name="Nama" placeholder="Masukkan nama siswa">

    <label>Komentar Koreksi:</label>
    <textarea id="Komentar" name="Komentar" rows="4" placeholder="Tuliskan koreksi atau komentar..."></textarea>

    <button type="submit">Kirim Koreksi</button>
  </form>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabaseUrl = 'https://pgyohppycxecdnfmoqgk.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBneW9ocHB5Y3hlY2RuZm1vcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNDM2NDEsImV4cCI6MjA5NjcxOTY0MX0.prvXAPB3ljwwsgaFq0dLng4Ejt2J9ViSX9gk7a38zdY' // anon key kamu
    const supabase = createClient(supabaseUrl, supabaseKey)

    document.getElementById('form-koreksi').addEventListener('submit', async (e) => {
      e.preventDefault()
      const nama = document.getElementById('Nama').value
      const komentar = document.getElementById('Komentar').value

      // Simpan ke tabel komentar (buat tabel 'komentar' di Supabase)
      const { error } = await supabase
        .from('komentar')
        .insert([{ nama_siswa: nama, komentar: komentar }])

      if (error) {
        alert('Gagal kirim koreksi: ' + error.message)
      } else {
        alert('Koreksi berhasil dikirim!')
        document.getElementById('form-koreksi').reset()
      }
    })
  </script>
</body>
</html>
