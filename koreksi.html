<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Koreksi Data Siswa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      margin: 40px;
    }
    h2 {
      margin-bottom: 20px;
      color: #333;
    }
    form {
      max-width: 600px;
      background: #fff;
      padding: 20px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      color: #555;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    button {
      margin-top: 15px;
      padding: 10px 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h2>Koreksi Data Siswa</h2>
  <form id="form-koreksi">
    <label for="Nama">Nama Siswa</label>
    <input type="text" id="Nama" name="Nama" readonly>

    <label for="Komentar">Komentar Koreksi</label>
    <textarea id="Komentar" name="Komentar" placeholder="Tuliskan koreksi atau komentar..."></textarea>

    <button type="submit">Kirim Koreksi</button>
  </form>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabaseUrl = 'https://pgyohppycxecdnfmoqgk.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBneW9ocHB5Y3hlY2RuZm1vcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNDM2NDEsImV4cCI6MjA5NjcxOTY0MX0.prvXAPB3ljwwsgaFq0dLng4Ejt2J9ViSX9gk7a38zdY' // anon key kamu
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Ambil NISN dari URL
    const urlParams = new URLSearchParams(window.location.search)
    const nisn = urlParams.get('nisn')

    // Ambil data siswa untuk isi nama
    const { data } = await supabase
      .from('siswa')
      .select('Nama')
      .eq('NISN', nisn)
      .single()

    if (data) {
      document.getElementById('Nama').value = data.Nama
    }

    // Simpan komentar ke kolom komentar di tabel siswa
    document.getElementById('form-koreksi').addEventListener('submit', async (e) => {
      e.preventDefault()
      const komentar = document.getElementById('Komentar').value

      const { error } = await supabase
        .from('siswa')
        .update({ komentar: komentar })
        .eq('NISN', nisn)

      if (error) {
        alert('Gagal simpan koreksi: ' + error.message)
      } else {
        alert('Koreksi berhasil dikirim!')
        window.location.href = 'siswa.html'
      }
    })
  </script>
</body>
</html>
